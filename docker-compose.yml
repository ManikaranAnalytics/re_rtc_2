services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: re-rtc-optimizer:latest
    container_name: re-rtc-app
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - PORT=8000
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-2}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    volumes:
      # Persist data directory so forecast CSVs survive container restarts
      - ./data:/app/data:ro
      - ./assets:/app/assets:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
